name: Create release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Optional tag override (defaults to v<code version>)
        required: false
        type: string

permissions:
  actions: write
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Resolve version and tag
        id: release
        shell: bash
        env:
          REQUESTED_TAG: ${{ inputs.tag }}
        run: |
          VERSION="$(python -c "import sys; sys.path.insert(0, 'src'); from ga_clock._version import __version__; print(__version__)")"
          if [[ -n "$REQUESTED_TAG" ]]; then
            TAG="$REQUESTED_TAG"
          else
            TAG="v$VERSION"
          fi

          git check-ref-format "refs/tags/$TAG"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists." >&2
            exit 1
          fi
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --generate-notes

      - name: Start build and PyPI publication
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          gh workflow run release.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref "$TAG" \
            --field publish=true

      - name: Write summary
        shell: bash
        env:
          VERSION: ${{ steps.release.outputs.version }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          echo "## Release created" >> "$GITHUB_STEP_SUMMARY"
          echo "- Version: \`$VERSION\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: \`$TAG\`" >> "$GITHUB_STEP_SUMMARY"
