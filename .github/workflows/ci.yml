name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        include:
          - os: windows-latest
            python-version: "3.10"
          - os: windows-latest
            python-version: "3.14"
          - os: macos-latest
            python-version: "3.10"
          - os: macos-latest
            python-version: "3.14"

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install --upgrade pip && python -m pip install -e ".[test]"
      - name: Compile package
        run: python -m compileall -q src
      - name: Test
        run: python -m pytest --cov=ga_clock --cov-report=term-missing
      - name: Check installed dependencies
        run: python -m pip check

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy
