name: Publish to PyPI

on:
  workflow_run:
    workflows:
      - Release
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-pypi
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish package
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ga-clock
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out released commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Verify package version
        run: |
          PROJECT_VERSION="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")"
          CODE_VERSION="$(python -c "import sys; sys.path.insert(0, 'src'); import ga_clock; print(ga_clock.__version__)")"

          if [ "$PROJECT_VERSION" != "$CODE_VERSION" ]; then
            echo "pyproject.toml version ($PROJECT_VERSION) does not match ga_clock.__version__ ($CODE_VERSION)." >&2
            exit 1
          fi

          echo "Publishing ga-clock $PROJECT_VERSION" >> "$GITHUB_STEP_SUMMARY"

      - name: Build distributions
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check --strict dist/*

      - name: Smoke test wheel
        run: |
          python -m venv package-test
          package-test/bin/python -m pip install dist/*.whl
          package-test/bin/python -c "import ga_clock; print(ga_clock.__version__)"

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
