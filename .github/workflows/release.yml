name: Build and publish

on:
  push:
    tags: ["v*"]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the built distributions to PyPI
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade build twine
      - run: python -m build
      - run: python -m twine check dist/*
      - name: Smoke test built wheel
        run: |
          python -m venv wheel-smoke-test
          wheel-smoke-test/bin/python -m pip install dist/*.whl
          wheel-smoke-test/bin/python -c "import ga_clock; print(ga_clock.__version__)"
      - uses: actions/upload-artifact@v7
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error

  publish:
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.publish)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ga-clock
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: python-distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
