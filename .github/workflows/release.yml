name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release. Leave empty to use pyproject.toml."
        required: false
        type: string
      prerelease:
        description: "Mark this release as a prerelease."
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish latest release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Resolve release version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          PROJECT_VERSION="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")"
          CODE_VERSION="$(python -c "import sys; sys.path.insert(0, 'src'); import ga_clock; print(ga_clock.__version__)")"

          if [ "$PROJECT_VERSION" != "$CODE_VERSION" ]; then
            echo "pyproject.toml version ($PROJECT_VERSION) does not match ga_clock.__version__ ($CODE_VERSION)." >&2
            exit 1
          fi

          if [ "$REF_TYPE" = "tag" ]; then
            TAG="$REF_NAME"
            VERSION="${TAG#v}"
          elif [ -n "$INPUT_VERSION" ]; then
            VERSION="${INPUT_VERSION#v}"
            TAG="v$VERSION"
          else
            VERSION="$PROJECT_VERSION"
            TAG="v$VERSION"
          fi

          if [ "$VERSION" != "$PROJECT_VERSION" ]; then
            echo "Release version ($VERSION) does not match pyproject.toml version ($PROJECT_VERSION)." >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build distribution
        run: python -m build

      - name: Create release tag
        if: github.ref_type != 'tag'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists locally."
          else
            git tag "$TAG"
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists on origin."
          else
            git push origin "$TAG"
          fi

      - name: Create latest GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          PRERELEASE: ${{ inputs.prerelease || 'false' }}
        run: |
          EXTRA_ARGS=()
          if [ "$PRERELEASE" = "true" ]; then
            EXTRA_ARGS+=(--prerelease)
          else
            EXTRA_ARGS+=(--latest)
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* \
              --title "$TAG" \
              --generate-notes \
              "${EXTRA_ARGS[@]}"
          fi
